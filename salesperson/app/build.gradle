plugins {
    id 'com.android.application'
}
android {
    namespace 'com.frozia.salesperson'
    compileSdk 34
    defaultConfig {
        applicationId 'com.frozia.salesperson'
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }
    buildTypes {
        release {
            minifyEnabled false
            signingConfig signingConfigs.debug
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}
